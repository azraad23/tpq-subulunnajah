<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin â€“ TPQ Subulunnajah</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00C896;
    --green-dark: #00A07A;
    --green-light: #E0FBF4;
    --teal: #0EA5A0;
    --navy: #0F2744;
    --yellow: #FFD166;
    --red: #FF6B6B;
    --bg: #F0FDF9;
    --card: #FFFFFF;
    --text: #0F2744;
    --muted: #6B7C99;
    --border: #D1EEE8;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image: radial-gradient(circle at 20% 20%, rgba(0,200,150,0.12) 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, rgba(14,165,160,0.10) 0%, transparent 50%);
  }

  .login-wrap {
    width: 100%;
    max-width: 420px;
  }

  .logo-area {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 72px; height: 72px;
    background: var(--green);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    font-size: 36px;
    box-shadow: 0 8px 24px rgba(0,200,150,0.35);
  }

  .logo-area h1 {
    font-size: 22px; font-weight: 800;
    color: var(--navy);
    line-height: 1.2;
  }

  .logo-area p {
    font-size: 13px; color: var(--muted);
    margin-top: 4px;
  }

  .card {
    background: var(--card);
    border-radius: 24px;
    padding: 32px;
    border: 1.5px solid var(--border);
    box-shadow: 0 4px 40px rgba(0,0,0,0.06);
  }

  .card h2 {
    font-size: 20px; font-weight: 700;
    color: var(--navy);
    margin-bottom: 6px;
  }

  .card .subtitle {
    font-size: 13px; color: var(--muted);
    margin-bottom: 28px;
  }

  .form-group { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 13px; font-weight: 600;
    color: var(--navy);
    margin-bottom: 8px;
  }

  input[type="email"],
  input[type="password"],
  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: #FAFFFE;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(0,200,150,0.15);
  }

  .input-wrap { position: relative; }

  .toggle-pw {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    font-size: 18px; color: var(--muted);
    padding: 0; line-height: 1;
  }

  .btn-login {
    width: 100%;
    padding: 15px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(0,200,150,0.3);
  }

  .btn-login:hover { background: var(--green-dark); box-shadow: 0 6px 20px rgba(0,200,150,0.4); }
  .btn-login:active { transform: scale(0.98); }
  .btn-login:disabled { background: #B2E8DA; box-shadow: none; cursor: not-allowed; }

  .alert {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 16px;
    display: none;
  }
  .alert.error { background: #FFE8E8; color: #D92D20; border: 1px solid #FCA5A5; }
  .alert.success { background: var(--green-light); color: var(--green-dark); border: 1px solid var(--green); }
  .alert.show { display: block; }

  .back-link {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--muted);
  }
  .back-link a {
    color: var(--green-dark);
    font-weight: 600;
    text-decoration: none;
  }
  .back-link a:hover { text-decoration: underline; }

  .hint {
    margin-top: 20px;
    padding: 12px 16px;
    background: #FFFBEB;
    border-radius: 10px;
    border: 1px solid #FDE68A;
    font-size: 12px;
    color: #92400E;
  }
  .hint strong { display: block; margin-bottom: 4px; }

  @media (max-width: 480px) {
    .card { padding: 24px; }
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="logo-area">
    <div class="logo-icon">ðŸ•Œ</div>
    <h1>TPQ Subulunnajah</h1>
    <p>Sistem Manajemen Santri & SPP</p>
  </div>

  <div class="card">
    <h2>Login Admin</h2>
    <p class="subtitle">Masukkan kredensial admin untuk melanjutkan</p>

    <div class="alert" id="alert"></div>

    <div class="form-group">
      <label for="email">Email Admin</label>
      <input type="email" id="email" placeholder="Email Admin" autocomplete="username">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" autocomplete="current-password">
        <button type="button" class="toggle-pw" onclick="togglePw()" id="eyeBtn">ðŸ‘</button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">Masuk Dashboard</button>

    <div class="hint">
      <strong>ðŸ’¡ Akun Default:</strong>
      Email: - &nbsp;|&nbsp; Password: -
    </div>
  </div>

  <div class="back-link">
    <a href="/index.html">â† Kembali ke Form Pembayaran</a>
  </div>
</div>

<script>
  // Cek sudah login
  fetch('/api/me').then(r => r.json()).then(d => {
    if (d.loggedIn) window.location.href = '/admin.html';
  });

  function togglePw() {
    const pw = document.getElementById('password');
    const btn = document.getElementById('eyeBtn');
    if (pw.type === 'password') { pw.type = 'text'; btn.textContent = 'ðŸ™ˆ'; }
    else { pw.type = 'password'; btn.textContent = 'ðŸ‘'; }
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert ${type} show`;
  }

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    if (!email || !password) { showAlert('Email dan password wajib diisi!', 'error'); return; }

    btn.disabled = true; btn.textContent = 'Memproses...';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
        credentials: 'include'
      });
      const data = await res.json();

      if (data.success) {
        showAlert(`Selamat datang, ${data.nama}! ðŸŽ‰`, 'success');
        setTimeout(() => window.location.href = '/admin.html', 1000);
      } else {
        showAlert(data.message || 'Login gagal', 'error');
        btn.disabled = false; btn.textContent = 'Masuk Dashboard';
      }
    } catch (e) {
      showAlert('Gagal terhubung ke server', 'error');
      btn.disabled = false; btn.textContent = 'Masuk Dashboard';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
<footer style="text-align:center !important; padding:15px !important; background:#1a1a2e !important; color:#fff !important; font-size:14px !important; display:block !important; width:100% !important;">&copy; 2026 SUBULUNNAJAH. All Rights Reserved.</footer>
</body>
</html>
